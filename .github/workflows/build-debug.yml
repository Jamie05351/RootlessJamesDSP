name: Build debug APK

on:
  push:
    branches:
      - 'claude/**'

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleRootlessFullDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RootlessJamesDSP-debug
          path: app/build/outputs/apk/rootlessFull/debug/
