name: Build debug APK

on:
  push:
    branches:
      - 'claude/**'

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: adopt

      - name: Build debug APK
        uses: gradle/gradle-command-action@v2
        with:
          arguments: assembleRootlessFullDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RootlessJamesDSP-debug
          path: app/build/outputs/apk/rootlessFull/debug/*universal-debug.apk
